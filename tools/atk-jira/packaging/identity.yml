schema: open-cli-identity/v1
repo: atlassian-cli
binary: atk-jira
# repo-root-relative (identity-check --repo-root; .github#15): goreleaser runs
# from the monorepo root with go.work/shared context even though atk-jira's packaging
# and version live under tools/atk-jira (--working-dir).
goreleaser_config: .goreleaser.yml
tag:
  prefix: atk-jira-v
  version_scheme: major_minor_run_patch
# string-identical to .goreleaser.yml archives.name_template (identity-check
# compares the literal template, not its expansion).
archives:
  name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
packages:
  homebrew:
    canonical_cask: atk-jira
  winget: { id: wohsj110.atk-jira }
  chocolatey: { id: atk-jira }
  linux: { package_name: atk-jira }

# Faithful port of the pre-migration darwin Keychain gate, fixed for the §2
# output-rendering rollout (atk-jira has no --output/--json flag, so the old
# `--output json` form never worked post-rollout). With the backend override +
# token envs unset and an empty HOME, the arm64 binary auto-selects the macOS
# Keychain; `config show` (text table) reports it on the "keyring_backend" row.
# No seed_config — auto-detect selects keychain on darwin without one.
keychain_probe:
  env_unset: [ATLASSIAN_AGENT_CLI_KEYRING_BACKEND, JIRA_API_TOKEN, ATLASSIAN_API_TOKEN]
  command: ["config", "show"]
  output: text
  match:
    - 'keyring_backend \| keychain \(auto\)'

version_file: version.txt
